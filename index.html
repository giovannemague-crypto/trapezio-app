  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a18; min-height: 100vh; }
    .container { max-width: 560px; margin: 0 auto; padding: 1.25rem 1rem; }

    /* Tipografia */
    .label  { font-size: 11px; color: #73726c; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .title  { font-size: 18px; font-weight: 500; }
    .sub    { font-size: 12px; color: #73726c; margin-top: 2px; }
    .hint   { font-size: 11px; color: #9c9a92; margin-top: 6px; }

    /* Cards */
    .card   { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .card-gray { background: #f5f5f3; border-radius: 8px; padding: 12px 14px; }

    /* Botões */
    .btn-primary { width: 100%; padding: 12px; font-size: 14px; font-weight: 500; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.2); background: #1a1a18; color: #fff; cursor: pointer; margin-bottom: 8px; }
    .btn-primary:disabled { background: #e8e8e4; color: #9c9a92; cursor: not-allowed; border-color: transparent; }
    .btn-secondary { width: 100%; padding: 12px; font-size: 14px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.2); background: transparent; color: #1a1a18; cursor: pointer; }
    .btn-small { padding: 5px 12px; font-size: 12px; border-radius: 6px; border: 0.5px solid rgba(0,0,0,0.2); background: transparent; color: #73726c; cursor: pointer; }
    .btn-back { background: transparent; border: none; font-size: 22px; cursor: pointer; color: #73726c; padding: 0; line-height: 1; }

    /* Badges */
    .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; }
    .badge-green  { background: #eaf3de; color: #3b6d11; border: 0.5px solid #639922; }
    .badge-amber  { background: #faeeda; color: #854f0b; border: 0.5px solid #ba7517; }
    .badge-red    { background: #fcebeb; color: #a32d2d; border: 0.5px solid #e24b4a; }
    .badge-blue   { background: #e6f1fb; color: #185fa5; border: 0.5px solid #b5d4f4; }
    .badge-gray   { background: #f1efe8; color: #444441; border: 0.5px solid #b4b2a9; }

    /* Inputs */
    input[type=text], input[type=number], textarea, select {
      width: 100%; padding: 9px 12px; font-size: 14px; border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.2); background: #f5f5f3;
      color: #1a1a18; font-family: inherit; outline: none;
    }
    input:focus, textarea:focus, select:focus { border-color: rgba(0,0,0,0.4); }
    textarea { resize: vertical; }

    /* Grid de preços */
    .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .price-field label { font-size: 11px; color: #73726c; display: block; margin-bottom: 4px; }
    .price-row { display: flex; align-items: center; gap: 6px; }
    .price-row span { font-size: 13px; color: #73726c; }
    .price-row input { flex: 1; }
    .price-status { font-size: 10px; margin-top: 3px; }

    /* Status bar */
    .status-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }

    /* Header */
    .header { margin-bottom: 1.25rem; }
    .header-row { display: flex; justify-content: space-between; align-items: flex-start; }

    /* Registro card */
    .reg-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
    .reg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .reg-tags { display: flex; gap: 6px; flex-wrap: wrap; }

    /* Foto preview */
    .foto-btn { width: 100%; padding: 20px; font-size: 13px; border-radius: 8px; border: 0.5px dashed rgba(0,0,0,0.2); background: #f5f5f3; color: #73726c; cursor: pointer; text-align: center; line-height: 1.6; }
    .foto-preview { position: relative; }
    .foto-preview img { width: 100%; border-radius: 8px; max-height: 180px; object-fit: cover; }
    .foto-overlay { position: absolute; bottom: 6px; left: 6px; }
    .foto-change  { position: absolute; top: 6px; right: 6px; }

    /* Dropdown sugestões */
    .dropdown { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; z-index: 20; margin-top: 2px; overflow: hidden; }
    .dropdown-item { padding: 9px 12px; font-size: 13px; cursor: pointer; border-bottom: 0.5px solid rgba(0,0,0,0.06); }
    .dropdown-item:hover { background: #f5f5f3; }
    .dropdown-item:last-child { border-bottom: none; }
    .input-wrap { position: relative; }

    /* Spinner */
    .spinner-wrap { text-align: center; padding: 1.5rem 0; }
    .spinner { width: 28px; height: 28px; border: 2px solid #e8e8e4; border-top-color: #1a1a18; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Tabs */
    .tabs { display: flex; border-bottom: 0.5px solid rgba(0,0,0,0.1); margin-bottom: 1.25rem; }
    .tab { padding: 8px 16px; font-size: 13px; border: none; border-bottom: 2px solid transparent; background: transparent; color: #73726c; cursor: pointer; }
    .tab.active { border-bottom-color: #1a1a18; color: #1a1a18; font-weight: 500; }

    /* Aviso */
    .alert-amber { background: #faeeda; border: 0.5px solid #ba7517; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #854f0b; margin-bottom: 12px; }
    .alert-blue  { background: #e6f1fb; border: 0.5px solid #b5d4f4; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #185fa5; margin-bottom: 12px; }

    /* Tabela resumo */
    .resumo-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .resumo-table th { text-align: left; padding: 8px 10px; font-weight: 500; color: #73726c; border-bottom: 0.5px solid rgba(0,0,0,0.1); }
    .resumo-table td { padding: 10px 10px; border-bottom: 0.5px solid rgba(0,0,0,0.06); }

    /* Vazio */
    .empty { border: 0.5px dashed rgba(0,0,0,0.15); border-radius: 12px; padding: 2rem; text-align: center; color: #73726c; margin-bottom: 12px; font-size: 13px; line-height: 1.7; }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; color: #e8e8e4; }
      .card, .reg-card { background: #2c2c2a; border-color: rgba(255,255,255,0.1); }
      .card-gray { background: #232321; }
      input[type=text], input[type=number], textarea, select { background: #232321; color: #e8e8e4; border-color: rgba(255,255,255,0.15); }
      .foto-btn { background: #232321; border-color: rgba(255,255,255,0.15); color: #9c9a92; }
      .dropdown { background: #2c2c2a; border-color: rgba(255,255,255,0.15); }
      .dropdown-item:hover { background: #232321; }
      .btn-primary { background: #e8e8e4; color: #1a1a18; }
      .btn-primary:disabled { background: #333331; color: #666663; }
      .btn-secondary, .btn-small { color: #e8e8e4; border-color: rgba(255,255,255,0.2); }
      .tabs { border-color: rgba(255,255,255,0.1); }
      .tab { color: #9c9a92; }
      .tab.active { color: #e8e8e4; border-bottom-color: #e8e8e4; }
      .resumo-table th { color: #9c9a92; border-color: rgba(255,255,255,0.1); }
      .resumo-table td { border-color: rgba(255,255,255,0.06); }
      .empty { border-color: rgba(255,255,255,0.1); color: #9c9a92; }
      .status-bar .card-gray { background: #232321; }

function getPostoFromURL() {

// ============================================================
// HELPERS
// ============================================================
function calcStatus(nosso, deles) {
  const d = nosso - deles;
  if (d > 0.05)  return { label:`+R$ ${d.toFixed(2)} acima`, cls:'badge-red',   cor:'#a32d2d' };
  if (d < -0.05) return { label:`R$ ${Math.abs(d).toFixed(2)} abaixo`, cls:'badge-green', cor:'#3b6d11' };
  return { label:'Na média', cls:'badge-amber', cor:'#854f0b' };
}

function hoje() {
  return new Date().toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'2-digit', year:'numeric' });
}

function hora() {
  return new Date().toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = views[state.tela]();
  bindEvents();
}

// ============================================================
// OCR — Ler preços da foto via Tesseract.js (gratuito, no navegador)
// ============================================================
async function lerFotoComIA(file) {
  const url = URL.createObjectURL(file);
  
  // Atualiza mensagem de loading
  const spinnerMsg = document.querySelector('.spinner-wrap div:last-child');
  if (spinnerMsg) spinnerMsg.textContent = 'Lendo preços da imagem... (pode levar alguns segundos)';

  const result = await Tesseract.recognize(url, 'por+eng', {
    logger: m => {
      if (m.status === 'recognizing text') {
        const pct = Math.round(m.progress * 100);
        const msg = document.querySelector('.spinner-wrap div:last-child');
        if (msg) msg.textContent = `Lendo preços... ${pct}%`;
      }
    }
  });

  const texto = result.data.text;
  console.log('OCR texto bruto:', texto);

  // Extrai números no formato de preço (ex: 6,29 ou 6.29)
  const numeros = texto.match(/\d[\d.,]{2,4}\d/g) || [];
  const precos = numeros
    .map(n => parseFloat(n.replace(',', '.')))
    .filter(n => n >= 3.0 && n <= 12.0) // faixa válida de preço de combustível
    .map(n => n.toFixed(2));

  console.log('Preços encontrados:', precos);

  // Tenta mapear os preços encontrados aos combustíveis
  // Busca por palavras-chave no texto para identificar qual preço é qual
  const textoLower = texto.toLowerCase();
  
  let gc = '', ga = '', et = '', ds = '';

  // Estratégia: detecta por palavras-chave próximas aos números
  const linhas = texto.split('\n').map(l => l.trim()).filter(l => l);
  
  for (const linha of linhas) {
    const linhaLow = linha.toLowerCase();
    const num = (linha.match(/\d[\d.,]{2,4}\d/g) || [])
      .map(n => parseFloat(n.replace(',', '.')))
      .filter(n => n >= 3.0 && n <= 12.0)
      .map(n => n.toFixed(2))[0];
    
    if (!num) continue;
    
    if ((linhaLow.includes('etanol') || linhaLow.includes('alcool') || linhaLow.match(/\be\b/)) && !et) {
      et = num;
    } else if ((linhaLow.includes('aditi') || linhaLow.includes('podium') || linhaLow.includes('v-power') || linhaLow.includes('select')) && !ga) {
      ga = num;
    } else if ((linhaLow.includes('gasolina') || linhaLow.includes('comum') || linhaLow.includes('gas')) && !gc) {
      gc = num;
    } else if ((linhaLow.includes('diesel') || linhaLow.includes('s10') || linhaLow.includes('s-10')) && !ds) {
      ds = num;
    }
  }

  // Se não achou por palavra-chave, distribui pelos preços encontrados por ordem
  if (!gc && !ga && !et && !ds && precos.length > 0) {
    const sorted = [...precos].sort((a, b) => parseFloat(a) - parseFloat(b));
    if (sorted[0]) et = sorted[0];   // etanol geralmente é o mais barato
    if (sorted[1]) gc = sorted[1];   // gasolina comum
    if (sorted[2]) ga = sorted[2];   // gasolina aditivada
    if (sorted[3]) ds = sorted[3];   // diesel
  }

  URL.revokeObjectURL(url);
  return { gc, ga, et, ds };
}

// ============================================================
// API — Enviar registro ao N8N
// ============================================================
async function enviarN8N(registro) {
  try {
    await fetch(CONFIG.N8N_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ posto_id: state.posto.id, ...registro }),
    });
  } catch (e) {
    console.warn('N8N offline — dados salvos localmente');
  }
}

function irResumo()   { state.tela = 'resumo';   render(); }

function setNome(v)     { state.form.nome = v; atualizarBotao(); }
function setBandeira(v) { state.form.bandeira = v; }
function setPreco(k, v) { state.form[k] = v; atualizarBotao(); }
function setObs(v)      { state.form.obs = v; }
function setDrop(v)     { state.form.dropOpen = v; }

function escolherBandeira(b) {
  state.form.nome = b;
  state.form.bandeira = BANDEIRAS.includes(b) ? b : 'Outros';
  state.form.dropOpen = false;
  render();
}

function trocarFoto() {
  state.form.imgPreview = null;
  state.form.imgFile = null;
  state.form.iaUsada = false;
  state.form.erroIA = false;
  state.form.gc = state.form.ga = state.form.et = state.form.ds = '';
  render();
}

async function handleFoto(input) {
  const file = input.files[0];
  if (!file) return;
  state.form.imgPreview = URL.createObjectURL(file);
  state.form.imgFile = file;
  state.form.loading = true;
  state.form.iaUsada = false;
  state.form.erroIA = false;
  render();

  try {
    const precos = await lerFotoComIA(file);
    state.form.gc = precos.gc || '';
    state.form.ga = precos.ga || '';
    state.form.et = precos.et || '';
    state.form.ds = precos.ds || '';
    state.form.iaUsada = true;
  } catch(e) {
    state.form.erroIA = true;
  }
  state.form.loading = false;
  render();
}

function atualizarBotao() {
  const f = state.form;
  const btn = document.querySelector('.btn-primary');
  if (btn) {
    const pode = f.nome.trim().length > 0;
    btn.disabled = !pode;
  }
}

function salvar() {
  const f = state.form;
  const reg = {
    nome: f.nome, bandeira: f.bandeira,
    gc: f.gc, ga: f.ga, et: f.et, ds: f.ds,
    obs: f.obs, imgPreview: f.imgPreview,
    iaUsada: f.iaUsada, hora: hora(),
  };
  state.registros.push(reg);
  enviarN8N(reg);
  irLista();
}

async function enviarRelatorio() {
  try {
    await enviarN8N({ tipo: 'relatorio_dia', registros: state.registros });
    alert('Relatório enviado para o supervisor!');
  } catch(e) {
    alert('Erro ao enviar. Tente novamente.');
  }
}

  // eventos já estão inline nos elementos via onclick/oninput
}

// ============================================================
// INICIALIZAÇÃO
// ============================================================
function init() {
  const postoURL = getPostoFromURL();
  if (postoURL) {
    state.posto = postoURL;
    state.tela = 'lista';
  } else {
    state.tela = 'selector';
  }
  render();
}

init();
</script>
