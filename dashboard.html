<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Trapézio — Dashboard Supervisor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1520;color:#e0e8f0;min-height:100vh}

.topbar{background:#111927;border-bottom:1px solid #1e2d42;padding:0 20px;display:flex;justify-content:space-between;align-items:center;height:56px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{position:relative;width:38px;height:28px}
.logo-bg{width:38px;height:28px;background:#1a3a6b;border-radius:4px;display:flex;align-items:center;justify-content:center}
.logo-tri-w{width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;border-bottom:16px solid #fff}
.logo-tri-b{width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:11px solid #2e7dd1;position:absolute;top:10px;left:50%;transform:translateX(-50%)}
.logo-texts{display:flex;flex-direction:column;line-height:1}
.logo-postos{font-size:9px;color:#6a8aaa;letter-spacing:0.18em;text-transform:uppercase;font-weight:500}
.logo-name{font-size:18px;font-weight:800;color:#fff;letter-spacing:0.06em;text-transform:uppercase;font-style:italic;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.pill{font-size:11px;padding:3px 10px;border-radius:4px}
.pill-live{background:rgba(46,209,100,0.15);color:#4dd87a;border:1px solid rgba(46,209,100,0.25)}
.pill-date{background:rgba(255,255,255,0.06);color:#7a9abа;border:1px solid rgba(255,255,255,0.1);color:#8aaac0}
.btn-ref{font-size:12px;padding:5px 14px;border-radius:4px;border:1px solid #2a4060;background:transparent;color:#8aaac0;cursor:pointer}
.btn-ref:hover{background:#1a2a3a;color:#fff}

.nav-tabs{background:#111927;border-bottom:1px solid #1e2d42;padding:0 20px;display:flex;gap:4px}
.nav-tab{padding:10px 20px;font-size:13px;font-weight:500;border:none;background:transparent;color:#6a8aaa;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.nav-tab.on{color:#fff;border-bottom-color:#2e7dd1}
.nav-tab:hover:not(.on){color:#aac0d8}

.content{padding:16px 20px}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi{background:#131e2e;border:1px solid #1e2d42;border-radius:6px;padding:14px 16px}
.kpi-label{font-size:10px;color:#4a6a8a;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.kpi-val{font-size:28px;font-weight:700;line-height:1}
.kpi-sub{font-size:11px;color:#4a6a8a;margin-top:5px}

.estado-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.estado-card{background:#131e2e;border:1px solid #1e2d42;border-radius:6px;padding:12px 14px}
.estado-nome{font-size:16px;font-weight:700;color:#e0e8f0}
.prog-wrap{height:4px;background:#1e2d42;border-radius:2px;overflow:hidden;margin:8px 0 4px}
.prog-bar{height:100%;border-radius:2px;transition:width 0.6s}

.toolbar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.input-s{flex:1;min-width:200px;padding:8px 14px;font-size:13px;border-radius:5px;border:1px solid #1e2d42;background:#131e2e;color:#e0e8f0;outline:none}
.input-s:focus{border-color:#2e7dd1}
.input-s::placeholder{color:#3a5a7a}
.btn-est{padding:6px 14px;font-size:12px;border-radius:5px;border:1px solid #1e2d42;background:#131e2e;color:#6a8aaa;cursor:pointer;font-weight:500}
.btn-est.on{background:#2e7dd1;color:#fff;border-color:#2e7dd1}
.btn-est:hover:not(.on){background:#1a2a3a;color:#aac0d8}

.posto-row{background:#131e2e;border:1px solid #1e2d42;border-radius:6px;padding:12px 16px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;gap:8px;cursor:pointer;transition:all 0.12s}
.posto-row:hover{border-color:#2e7dd1;background:#172030}
.posto-row.tem-alerta{border-left:3px solid #e24b4a}
.row-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-g{background:#4dd87a}.dot-r{background:#e24b4a}
.row-info{min-width:0}
.row-nome{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#e0e8f0}
.row-sub{font-size:11px;color:#4a6a8a;margin-top:2px}
.row-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.buscar-btn{font-size:12px;color:#2e7dd1;border:none;background:transparent;cursor:pointer;font-weight:500;white-space:nowrap}
.buscar-btn:hover{color:#5aaeff}

.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:3px;white-space:nowrap;font-weight:600;border:1px solid}
.b-ipa{background:rgba(250,174,50,0.12);color:#faa932;border-color:rgba(250,174,50,0.3)}
.b-she{background:rgba(226,75,74,0.12);color:#e24b4a;border-color:rgba(226,75,74,0.3)}
.b-br{background:rgba(46,125,209,0.12);color:#5aaeff;border-color:rgba(46,125,209,0.3)}
.b-tra{background:rgba(100,100,220,0.12);color:#9090ff;border-color:rgba(100,100,220,0.3)}
.b-rdp{background:rgba(29,158,117,0.12);color:#2ec496;border-color:rgba(29,158,117,0.3)}
.b-oth{background:rgba(255,255,255,0.06);color:#8aaac0;border-color:rgba(255,255,255,0.12)}
.b-red{background:rgba(226,75,74,0.15);color:#e24b4a;border-color:rgba(226,75,74,0.3)}
.b-amb{background:rgba(186,117,23,0.15);color:#f0a030;border-color:rgba(186,117,23,0.3)}
.b-grn{background:rgba(77,216,122,0.12);color:#4dd87a;border-color:rgba(77,216,122,0.3)}
.b-hrs{background:rgba(255,255,255,0.06);color:#6a8aaa;border-color:rgba(255,255,255,0.1);font-weight:400}

.alerta-row{background:#1e0f0f;border:1px solid #3a1a1a;border-left:3px solid #e24b4a;border-radius:6px;padding:12px 16px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.alerta-row:hover{background:#251515}
.pend-row{background:#1e1a0f;border:1px solid #3a2a0a;border-left:3px solid #f0a030;border-radius:6px;padding:12px 16px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.empty{text-align:center;padding:3rem;color:#4a6a8a;font-size:14px}

.det-back{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.btn-back{background:transparent;border:none;font-size:20px;cursor:pointer;color:#6a8aaa;padding:0;line-height:1}
.btn-back:hover{color:#fff}
.comp-card{background:#131e2e;border:1px solid #1e2d42;border-radius:6px;padding:14px 16px}
.comp-table{width:100%;border-collapse:collapse;font-size:13px}
.comp-table th{text-align:left;padding:8px 10px;font-size:10px;font-weight:600;color:#4a6a8a;text-transform:uppercase;letter-spacing:0.08em;border-bottom:1px solid #1e2d42}
.comp-table td{padding:10px 10px;border-bottom:1px solid #1a2535}
.comp-table tr:last-child td{border-bottom:none}

.sec-label{font-size:10px;font-weight:600;color:#4a6a8a;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;margin-top:4px}

@media(max-width:600px){.kpi-grid,.estado-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

  </div>
  <div id="lista"></div>
</div>

  {id:"062",nome:"Posto TS",end:"Av. Anita Garibaldi, 1305",bairro:"Ahú",cidade:"Curitiba",estado:"PR",bandeira:"Shell",hrs:"6h-22h"},
  {id:"063",nome:"Posto Via Torres",end:"Comendador Franco, 3133",bairro:"Jardim Das Américas",cidade:"Curitiba",estado:"PR",bandeira:"BR",hrs:"24h"},
  {id:"064",nome:"Posto Vila Resende",end:"Av. Dona Francisca, 549",bairro:"Vila Rezende",cidade:"Piracicaba",estado:"SP",bandeira:"Shell",hrs:"6h-22h"},
  {id:"065",nome:"Posto WC",end:"Rod BR-101, 8600",bairro:"Quarta Linha",cidade:"Criciúma",estado:"SC",bandeira:"Ipiranga",hrs:"24h"},
];

const COMBS=[{k:"gc",l:"Gasolina Comum"},{k:"ga",l:"Gasolina Aditivada"},{k:"et",l:"Etanol"},{k:"ds",l:"Diesel S10"}];
const ESTADOS=["Todos","PR","RS","SC","SP"];
const BCLS={Ipiranga:"b-ipa",Shell:"b-she",BR:"b-br","Trapézio":"b-tra",RDP:"b-rdp",TOF:"b-oth"};

let S={dados:[],aba:"geral",estado:"Todos",busca:"",det:null};

function gerarDados(){
  return POSTOS.map(p=>{
    const reg=Math.random()>0.25;
    const conc=reg?Math.floor(Math.random()*5)+3:0;
    const pr={gc:+(6.1+Math.random()*0.7).toFixed(2),ga:+(6.4+Math.random()*0.7).toFixed(2),et:+(3.9+Math.random()*0.5).toFixed(2),ds:+(5.9+Math.random()*0.5).toFixed(2)};
    const mc={gc:+(6.1+Math.random()*0.7).toFixed(2),ga:+(6.4+Math.random()*0.7).toFixed(2),et:+(3.9+Math.random()*0.5).toFixed(2),ds:+(5.9+Math.random()*0.5).toFixed(2)};
    const alertas=COMBS.filter(c=>pr[c.k]-mc[c.k]>0.08).map(c=>c.l);
    return{...p,reg,conc,pr,mc,alertas};
  });
}

function bcls(b){return BCLS[b]||"b-oth"}
function stCls(d){
  if(d>0.08) return{l:`+R$ ${d.toFixed(2)}`,c:"b-red"};
  if(d<-0.08) return{l:`-R$ ${Math.abs(d).toFixed(2)}`,c:"b-grn"};
  return{l:"Na média",c:"b-amb"};
}
function filtrados(){
  return S.dados
    .filter(p=>S.estado==="Todos"||p.estado===S.estado)
    .filter(p=>
      p.nome.toLowerCase().includes(S.busca.toLowerCase())||
      p.bairro.toLowerCase().includes(S.busca.toLowerCase())||
      p.cidade.toLowerCase().includes(S.busca.toLowerCase())
    );
}

function renderKPIs(){
  const d=S.dados,tot=d.length;
  const reg=d.filter(p=>p.reg).length;
  const pend=tot-reg;
  const alrt=d.filter(p=>p.alertas.length>0).length;
  const pct=Math.round(reg/tot*100);
  document.getElementById("cnt-total").textContent=tot;
  document.getElementById("cnt-alrt").textContent=alrt;
  document.getElementById("cnt-pend").textContent=pend;
  document.getElementById("kpis").innerHTML=[
    {l:"Total de postos",v:tot,s:"PR · RS · SC · SP",cor:"#5aaeff"},
    {l:"Registraram hoje",v:reg,s:`${pct}% da rede`,cor:"#4dd87a"},
    {l:"Aguardando",v:pend,s:"sem registro",cor:pend>0?"#e24b4a":"#4dd87a"},
    {l:"Alertas de preço",v:alrt,s:"acima da média",cor:alrt>0?"#e24b4a":"#4dd87a"},
  ].map(k=>`<div class="kpi"><div class="kpi-label">${k.l}</div><div class="kpi-val" style="color:${k.cor}">${k.v}</div><div class="kpi-sub">${k.s}</div></div>`).join("");
}

function renderEstados(){
  const d=S.dados;
  document.getElementById("estados").innerHTML=["PR","RS","SC","SP"].map(e=>{
    const tot=d.filter(p=>p.estado===e).length;
    const ok=d.filter(p=>p.estado===e&&p.reg).length;
    const pct=Math.round(ok/tot*100);
    const cor=pct===100?"#4dd87a":pct>=70?"#2e7dd1":"#e24b4a";
    return`<div class="estado-card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span class="estado-nome">${e}</span>
        <span style="font-size:12px;color:#4a6a8a;">${ok}/${tot}</span>
      </div>
      <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%;background:${cor}"></div></div>
      <div style="font-size:11px;color:#4a6a8a;">${pct}% registraram</div>
    </div>`;
  }).join("");
}

function renderEstBtns(){
  document.getElementById("est-btns").innerHTML=ESTADOS.map(e=>
    `<button class="btn-est ${S.estado===e?"on":""}" onclick="setEst('${e}')">${e}</button>`
  ).join("");
}

function renderLista(){
  const df=filtrados();
  const lista=document.getElementById("lista");

  if(S.det){
    renderDetalhe();
    return;
  }

  let html="";
  if(S.aba==="geral"){
    if(!df.length){html=`<div class="empty">Nenhum posto encontrado.</div>`}
    else df.forEach(p=>{
      html+=`<div class="posto-row${p.alertas.length>0?" tem-alerta":""}" onclick="abrirDet('${p.id}')">
        <div class="row-left">
          <span class="dot ${p.reg?"dot-g":"dot-r"}"></span>
          <div class="row-info">
            <div class="row-nome">${p.nome} <span class="badge ${bcls(p.bandeira)}" style="margin-left:4px">${p.bandeira}</span> <span class="badge b-hrs">${p.hrs}</span></div>
            <div class="row-sub" style="margin-top:3px;">
              <span style="color:#2e7dd1;font-size:11px;">↑</span> ${p.end} · ${p.bairro} · ${p.cidade}/${p.estado}
            </div>
          </div>
        </div>
        <div class="row-right">
          ${p.alertas.length>0?`<span class="badge b-red">${p.alertas.length} alerta${p.alertas.length>1?"s":""}</span>`:""}
          ${!p.reg?`<span class="badge b-amb">Pendente</span>`:""}
          <button class="buscar-btn">Ver detalhes →</button>
        </div>
      </div>`;
    });
  } else if(S.aba==="alertas"){
    const lista2=df.filter(p=>p.alertas.length>0);
    if(!lista2.length){html=`<div class="empty">Nenhum alerta no filtro selecionado.</div>`}
    else lista2.forEach(p=>{
      html+=`<div class="alerta-row" onclick="abrirDet('${p.id}')">
        <div>
          <div style="font-weight:500;font-size:13px;color:#e0e8f0;">${p.nome} <span class="badge ${bcls(p.bandeira)}" style="margin-left:4px">${p.bandeira}</span></div>
          <div style="font-size:11px;color:#e24b4a;margin-top:3px;">${p.cidade}/${p.estado} · Acima da média: ${p.alertas.join(", ")}</div>
        </div>
        <button class="buscar-btn">Ver detalhes →</button>
      </div>`;
    });
  } else if(S.aba==="pendentes"){
    const lista3=df.filter(p=>!p.reg);
    if(!lista3.length){html=`<div class="empty">Todos os postos registraram hoje!</div>`}
    else lista3.forEach(p=>{
      html+=`<div class="pend-row">
        <div>
          <div style="font-weight:500;font-size:13px;color:#e0e8f0;">${p.nome} <span class="badge ${bcls(p.bandeira)}" style="margin-left:4px">${p.bandeira}</span></div>
          <div style="font-size:11px;color:#f0a030;margin-top:3px;">${p.cidade}/${p.estado} · ${p.bairro} · Sem registro hoje</div>
        </div>
        <span class="badge b-amb">Cobrar gerente</span>
      </div>`;
    });
  }
  lista.innerHTML=html;
}

function renderDetalhe(){
  const p=S.det;
  const bc=bcls(p.bandeira);
  document.getElementById("lista").innerHTML=`
    <div class="det-back">
      <button class="btn-back" onclick="fecharDet()">←</button>
      <div>
        <div style="font-size:11px;color:#4a6a8a;text-transform:uppercase;letter-spacing:0.06em;">${p.bairro} · ${p.cidade}/${p.estado}</div>
        <div style="font-size:18px;font-weight:700;color:#e0e8f0;">${p.nome}</div>
      </div>
    </div>
    <div class="kpi-grid" style="margin-bottom:14px;">
      ${[
        {l:"Bandeira",v:`<span class="badge ${bc}" style="font-size:12px;padding:3px 10px;">${p.bandeira}</span>`},
        {l:"Status hoje",v:p.reg?"Registrou":"Pendente",cor:p.reg?"#4dd87a":"#e24b4a"},
        {l:"Concorrentes",v:`${p.conc} postos`,cor:"#5aaeff"},
        {l:"Alertas",v:p.alertas.length>0?`${p.alertas.length} combustíveis`:"Nenhum",cor:p.alertas.length>0?"#e24b4a":"#4dd87a"},
      ].map(k=>`<div class="kpi"><div class="kpi-label">${k.l}</div><div style="font-size:15px;font-weight:600;margin-top:6px;${k.cor?`color:${k.cor}`:""}">${k.v}</div></div>`).join("")}
    </div>
    <div class="sec-label">Comparativo de preços hoje</div>
    <div class="comp-card">
      <table class="comp-table">
        <thead><tr>
          <th>Combustível</th>
          <th style="text-align:right;color:#5aaeff;">Nosso preço</th>
          <th style="text-align:right;">Média conc.</th>
          <th style="text-align:right;">Status</th>
        </tr></thead>
        <tbody>
          ${COMBS.map(({k,l})=>{
            const st=stCls(p.pr[k]-p.mc[k]);
            return`<tr>
              <td style="font-weight:500;color:#e0e8f0;">${l}</td>
              <td style="text-align:right;font-weight:700;color:#5aaeff;">R$ ${p.pr[k].toFixed(2)}</td>
              <td style="text-align:right;color:#4a6a8a;">R$ ${p.mc[k].toFixed(2)}</td>
              <td style="text-align:right;"><span class="badge ${st.c}">${st.l}</span></td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>`;
}

function render(){
  renderKPIs();
  renderEstados();
  renderEstBtns();
  renderLista();
}

function setAba(v,el){
  S.aba=v;S.det=null;
  document.querySelectorAll(".nav-tab").forEach(t=>t.classList.remove("on"));
  if(el) el.classList.add("on");
  renderLista();
}
function setEst(v){S.estado=v;renderEstBtns();renderLista()}
function setBusca(v){S.busca=v;renderLista()}
function abrirDet(id){S.det=S.dados.find(p=>p.id===id);renderDetalhe()}
function fecharDet(){S.det=null;renderLista()}
function atualizar(){S.dados=gerarDados();render()}

document.getElementById("topdate").textContent=
  new Date().toLocaleDateString("pt-BR",{weekday:"short",day:"2-digit",month:"2-digit",year:"2-digit"});

S.dados=gerarDados();
render();
setInterval(()=>{S.dados=gerarDados();renderKPIs();renderEstados();},5*60*1000);
</script>
</body>
</html>
